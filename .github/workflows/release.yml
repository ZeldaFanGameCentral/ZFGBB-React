name: Release

on:
  push:
    branches: [main, development]
  workflow_dispatch:
    inputs:
      tag:
        description: Override image tag (defaults to short SHA)
        required: false
        default: ""
      api_url:
        description: >
          Browser-facing API URL baked into the build (REACT_ZFGBB_API_URL).
          Leave blank to derive from branch (main→api.zfgc.com, development→api-dev.zfgc.com).
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.docker.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve API URL
        id: api
        run: |
          if [[ -n "${{ inputs.api_url }}" ]]; then
            echo "url=${{ inputs.api_url }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF_NAME" == "development" ]]; then
            echo "url=https://api-dev.zfgc.com/zfgbb" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://api.zfgc.com/zfgbb" >> "$GITHUB_OUTPUT"
          fi

      - uses: ZeldaFanGameCentral/github-common/actions/docker-release@main
        id: docker
        with:
          image_name: zfgbb-react
          docker_target: app
          tag: ${{ inputs.tag }}
          build_args: REACT_ZFGBB_API_URL=${{ steps.api.outputs.url }}
          registry_token: ${{ secrets.GITHUB_TOKEN }}

  bump-argo:
    needs: release
    if: github.event_name == 'push'
    uses: ZeldaFanGameCentral/github-common/.github/workflows/reusable-bump-argo.yml@main
    with:
      app: zfgbb-react
      env_label: ${{ github.ref_name == 'development' && 'dev' || 'prod' }}
      deployment_dir: apps/zfgbb-react/${{ github.ref_name }}
      tag: ${{ needs.release.outputs.tag }}
    secrets:
      BUMP_APP_ID: ${{ secrets.BUMP_APP_ID }}
      BUMP_APP_PRIVATE_KEY: ${{ secrets.BUMP_APP_PRIVATE_KEY }}
