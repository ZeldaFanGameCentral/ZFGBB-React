name: release

on:
  push:
    branches: [ main, development ]
  workflow_dispatch:
    inputs:
      tag:
        description: Override image tag (defaults to short SHA)
        required: false
        default: ""
      api_url:
        description: |
          Browser-facing API URL baked into the build (REACT_ZFGBB_API_URL).
          Leave blank on push events — derived from the branch:
            main        → https://api.bluedreamers.com/zfgbb
            development → https://api-dev.bluedreamers.com/zfgbb
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: zfgbb-react

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute lowercase image ref + tag + api_url
        id: meta
        run: |
          set -euo pipefail
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}" >> "$GITHUB_ENV"
          if [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_SHA::12}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          if [[ -n "${{ inputs.api_url }}" ]]; then
            api_url="${{ inputs.api_url }}"
          elif [[ "$GITHUB_REF_NAME" == "development" ]]; then
            api_url="https://api-dev.bluedreamers.com/zfgbb"
          else
            api_url="https://api.bluedreamers.com/zfgbb"
          fi
          echo "api_url=$api_url" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: app
          push: true
          provenance: false
          build-args: |
            REACT_ZFGBB_API_URL=${{ steps.meta.outputs.api_url }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-argo:
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/development')
    runs-on: ubuntu-latest
    steps:
      - name: Generate App installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.BUMP_APP_CLIENT_ID }}
          private-key: ${{ secrets.BUMP_APP_PRIVATE_KEY }}
          owner: ZeldaFanGameCentral
          repositories: argocd.zfgc.com

      - name: Checkout argocd repo
        uses: actions/checkout@v6
        with:
          repository: ZeldaFanGameCentral/argocd.zfgc.com
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          path: argocd

      - name: Bump image.tag
        id: bump
        env:
          NEW_TAG: ${{ needs.build-and-push.outputs.tag }}
        run: |
          set -euo pipefail
          cd argocd
          if [[ "$GITHUB_REF_NAME" == "development" ]]; then
            file=environments/linode-dev/zfgbb-react.values.yaml
            env_label=dev
          else
            file=charts/zfgbb-react/values.yaml
            env_label=prod
          fi
          old_tag=$(awk '/^  tag:/{print $2; exit}' "$file" | tr -d '"')
          if [[ "$old_tag" == "$NEW_TAG" ]]; then
            echo "$env_label tag already $NEW_TAG; nothing to bump"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sed -i "0,/^  tag: .*/s||  tag: $NEW_TAG|" "$file"
          echo "file=$file" >> "$GITHUB_OUTPUT"
          echo "env_label=$env_label" >> "$GITHUB_OUTPUT"
          echo "old_tag=$old_tag" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_TAG: ${{ needs.build-and-push.outputs.tag }}
          OLD_TAG: ${{ steps.bump.outputs.old_tag }}
          BUMP_FILE: ${{ steps.bump.outputs.file }}
          ENV_LABEL: ${{ steps.bump.outputs.env_label }}
        run: |
          set -euo pipefail
          cd argocd
          branch="bump/zfgbb-react-${ENV_LABEL}-$NEW_TAG"
          git config user.name 'zfgbb-react-release-bot[bot]'
          git config user.email 'zfgbb-react-release-bot[bot]@users.noreply.github.com'
          git checkout -b "$branch"
          git add "$BUMP_FILE"
          msg=$(printf 'Bump zfgbb-react (%s) image to %s\n\nFrom: %s\nTo:   %s\nFile: %s\n' "$ENV_LABEL" "$NEW_TAG" "$OLD_TAG" "$NEW_TAG" "$BUMP_FILE")
          git commit -m "$msg"
          git push -u origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Bump zfgbb-react ($ENV_LABEL) image to $NEW_TAG" \
            --body "Automated bump from \`$OLD_TAG\` to \`$NEW_TAG\` in \`$BUMP_FILE\`. Built from \`$GITHUB_REPOSITORY@$GITHUB_SHA\` on \`$GITHUB_REF_NAME\`."
