name: Auto Merge Dependabot Security Updates
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - dependabot/**

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabutt:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ZFGCCP/.github/.github/actions/auto-approve-dependabot/action.yml@v0.0.1
